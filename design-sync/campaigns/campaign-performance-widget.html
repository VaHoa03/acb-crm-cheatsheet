<!-- @dsCard group="Campaigns" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard – Widget hiệu quả chiến dịch</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --background: #f0f4f9;
    --foreground: #0d1b2a;
    --card: #ffffff;
    --primary: #004b9a;
    --secondary: #e8f0fb;
    --muted: #edf1f7;
    --muted-foreground: #6b7a95;
    --accent: #f97316;
    --border: rgba(0, 75, 154, 0.12);
  }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--background); color: var(--foreground); }
</style>
</head>
<body class="p-5">
  <div class="max-w-[420px] mx-auto">
    <div class="rounded-xl border" style="background:var(--card); border-color:var(--border)">

      <!-- Header -->
      <div class="flex items-center justify-between px-3 py-2 border-b" style="border-color:var(--border)">
        <div class="flex items-center gap-1.5">
          <i data-lucide="megaphone" class="w-3.5 h-3.5" style="color:var(--primary)"></i>
          <span class="text-xs font-semibold uppercase tracking-wide" style="color:var(--muted-foreground)">Hiệu quả chiến dịch</span>
        </div>
        <button class="text-xs flex items-center gap-0.5" style="color:var(--primary)">
          Xem tất cả <i data-lucide="chevron-right" class="w-3 h-3"></i>
        </button>
      </div>

      <!-- Bars -->
      <div class="p-4 space-y-3">

        <!-- Campaign 1 -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs truncate" style="color:var(--foreground)">Tháng 6 – Vay nhà lãi suất ưu đãi</span>
            <span class="text-xs flex-shrink-0" style="color:var(--muted-foreground)">128 leads · 24 chốt</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden" style="background:#f1f5f9">
            <div class="h-full" style="width:100%; background:#004b9a"></div>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden mt-0.5" style="background:#f1f5f9">
            <div class="h-full rounded-full" style="width:18.8%; background:#16a34a"></div>
          </div>
        </div>

        <!-- Campaign 2 -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs truncate" style="color:var(--foreground)">Zalo OA – Tiết kiệm Online</span>
            <span class="text-xs flex-shrink-0" style="color:var(--muted-foreground)">96 leads · 15 chốt</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden" style="background:#f1f5f9">
            <div class="h-full" style="width:75%; background:#004b9a"></div>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden mt-0.5" style="background:#f1f5f9">
            <div class="h-full rounded-full" style="width:15.6%; background:#16a34a"></div>
          </div>
        </div>

        <!-- Campaign 3 -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs truncate" style="color:var(--foreground)">SMS – Thẻ tín dụng ưu đãi hè</span>
            <span class="text-xs flex-shrink-0" style="color:var(--muted-foreground)">64 leads · 8 chốt</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden" style="background:#f1f5f9">
            <div class="h-full" style="width:50%; background:#004b9a"></div>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden mt-0.5" style="background:#f1f5f9">
            <div class="h-full rounded-full" style="width:12.5%; background:#16a34a"></div>
          </div>
        </div>

        <!-- Campaign 4 -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs truncate" style="color:var(--foreground)">Email – Khách hàng VIP Q2</span>
            <span class="text-xs flex-shrink-0" style="color:var(--muted-foreground)">24 leads · 7 chốt</span>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden" style="background:#f1f5f9">
            <div class="h-full" style="width:19%; background:#6b7280"></div>
          </div>
          <div class="flex h-2.5 rounded-full overflow-hidden mt-0.5" style="background:#f1f5f9">
            <div class="h-full rounded-full" style="width:29.2%; background:#16a34a"></div>
          </div>
        </div>

        <!-- Legend -->
        <div class="flex items-center gap-4 pt-1">
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full" style="background:#004b9a"></span>
            <span class="text-xs" style="color:var(--muted-foreground)">Leads thu được</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full" style="background:#16a34a"></span>
            <span class="text-xs" style="color:var(--muted-foreground)">Tỷ lệ chuyển đổi</span>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>lucide.createIcons();</script>
</body>
</html>
